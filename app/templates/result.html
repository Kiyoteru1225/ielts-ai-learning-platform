{% extends "base.html" %}
{% block title %}批改结果 · 雅思写作 AI 批改{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-3">📝 批改结果</h1>

        <div class="card mb-4">
            <div class="card-body">
                {{ result_md | safe }}
            </div>
        </div>

        <div class="mb-4">
            <a href="/writing/" class="btn btn-outline-primary">再评一篇</a>
        </div>

        <div class="card">
            <div class="card-header">
                <button class="btn btn-link text-decoration-none p-0" type="button" data-bs-toggle="collapse" data-bs-target="#originalEssay">
                    📄 查看原文
                </button>
            </div>
            <div id="originalEssay" class="collapse">
                <div class="card-body">
                    <pre class="mb-0" style="white-space: pre-wrap; word-wrap: break-word;">{{ original_essay }}</pre>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
