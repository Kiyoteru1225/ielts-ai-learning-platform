<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IELTS Lab{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #fafbfc;
            --surface:     #ffffff;
            --brand-dark:  #1c1e54;
            --heading:     #061b31;
            --body:        #64748d;
            --label:       #273951;
            --muted:       #94a3b8;
            --purple:      #533afd;
            --purple-hover:#4434d4;
            --purple-light:#b9b9f9;
            --purple-bg:   rgba(83,58,253,0.06);
            --border:      #e5edf5;
            --radius:      4px;
            --radius-card: 6px;
            --shadow-card: rgba(50,50,93,0.25) 0px 30px 45px -30px, rgba(0,0,0,0.1) 0px 18px 36px -18px;
            --shadow-sm:   rgba(23,23,23,0.06) 0px 3px 6px;
            --success:     #15be53;
            --success-text:#108c3d;
            --danger:      #ea2261;
            --danger-bg:   rgba(234,34,97,0.08);
            --font:        'Source Sans 3', system-ui, -apple-system, sans-serif;
            --font-mono:   'Source Code Pro', ui-monospace, monospace;
        }

        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font); color: var(--heading); background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

        /* Navigation */
        nav {
            position: sticky; top: 0; z-index: 10;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 56px;
        }
        .nav-brand { font-size: 15px; font-weight: 600; color: var(--heading); display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-brand-icon { width: 26px; height: 26px; background: var(--purple); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600; flex-shrink: 0; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { font-size: 14px; font-weight: 400; color: var(--heading); text-decoration: none; transition: color 0.15s; }
        .nav-links a:hover { color: var(--purple); }
        .nav-links a.active { color: var(--purple); font-weight: 600; }

        /* Main content */
        main { flex: 1; }
        .container { max-width: 920px; margin: 0 auto; padding: 48px 24px; }
        .container-narrow { max-width: 480px; margin: 0 auto; padding: 48px 24px; }

        /* Hero */
        .hero { background: var(--surface); padding: 72px 32px 56px; text-align: center; }
        .hero h1 { font-size: 48px; font-weight: 300; line-height: 1.15; letter-spacing: -0.96px; color: var(--heading); margin-bottom: 12px; max-width: 700px; margin-left: auto; margin-right: auto; }
        .hero p { font-size: 18px; font-weight: 300; color: var(--body); line-height: 1.4; max-width: 560px; margin: 0 auto 28px; }
        .hero-actions { display: flex; gap: 12px; justify-content: center; }

        /* Dark stats section */
        .dark-section { background: var(--brand-dark); padding: 64px 0; margin-top: 56px; }
        .dark-section .container { padding-top: 0; padding-bottom: 0; }
        .dark-section h2 { font-size: 32px; font-weight: 300; letter-spacing: -0.64px; color: #fff; text-align: center; margin-bottom: 32px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 24px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 300; color: #fff; line-height: 1; margin-bottom: 6px; }
        .stat-label { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.6); }

        /* Typography */
        .page-title { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; color: var(--heading); margin-bottom: 28px; }
        .card-title { font-size: 22px; font-weight: 300; letter-spacing: -0.22px; color: var(--heading); margin-bottom: 4px; }
        .card-subtitle { font-size: 14px; color: var(--body); margin-bottom: 20px; }

        /* Cards */
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card);
            box-shadow: var(--shadow-card); padding: 32px; margin-bottom: 28px;
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 22px; border-radius: var(--radius); font-family: var(--font);
            font-size: 16px; font-weight: 400; cursor: pointer; text-decoration: none;
            transition: all 0.15s; border: none; line-height: 1.4;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--purple); color: #fff; }
        .btn-primary:hover { background: var(--purple-hover); }
        .btn-ghost { background: transparent; color: var(--purple); border: 1px solid var(--purple-light); }
        .btn-ghost:hover { background: var(--purple-bg); }
        .btn-block { width: 100%; }

        /* Form elements */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 400; color: var(--label); margin-bottom: 6px; }
        .form-input {
            display: block; width: 100%; padding: 10px 14px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-family: var(--font); font-size: 16px; font-weight: 300;
            color: var(--heading); background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s; outline: none;
        }
        .form-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(83,58,253,0.1); }
        .form-input::placeholder { color: var(--muted); }
        textarea.form-input { resize: vertical; line-height: 1.6; }

        /* Alert / Error */
        .alert-danger {
            background: var(--danger-bg); color: var(--danger);
            border: 1px solid rgba(234,34,97,0.2); border-radius: var(--radius);
            padding: 12px 16px; font-size: 14px; margin-bottom: 20px;
        }

        /* Pill tabs (button-based, not radio) */
        .task-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .task-pill { padding: 6px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 400; background: var(--surface); color: var(--body); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; font-family: var(--font); user-select: none; }
        .task-pill:hover { border-color: var(--purple-light); }
        .task-pill.active { background: var(--purple); color: #fff; border-color: var(--purple); }

        /* Essay textarea */
        .essay-textarea {
            width: 100%; min-height: 320px;
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px; font-family: var(--font); font-size: 16px; font-weight: 300;
            line-height: 1.6; color: var(--heading); resize: vertical; outline: none;
            transition: border-color 0.15s;
        }
        .essay-textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(83,58,253,0.1); }
        .essay-textarea::placeholder { color: var(--muted); }

        /* Word count */
        .word-count { font-size: 12px; color: var(--body); margin-top: 8px; }

        /* Score grid */
        .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
        .score-item { background: #f8f9fb; border: 1px solid var(--border); border-radius: 5px; padding: 16px; text-align: center; }
        .score-label { font-size: 11px; font-weight: 400; color: var(--body); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .score-value { font-size: 30px; font-weight: 300; color: var(--heading); line-height: 1; }
        .score-overall {
            grid-column: span 4;
            background: linear-gradient(135deg, #f5f3ff 0%, #f0eeff 100%);
            border: 1px solid var(--purple-light);
            display: flex; align-items: center; justify-content: center; gap: 24px;
            padding: 20px; border-radius: var(--radius-card);
        }
        .score-overall .overall-badge { font-size: 48px; font-weight: 300; color: var(--purple); line-height: 1; }
        .score-overall .overall-text { text-align: left; }
        .score-overall .overall-text .band { font-size: 20px; font-weight: 400; color: var(--heading); }
        .score-overall .overall-text .desc { font-size: 14px; color: var(--body); }

        /* Feedback */
        .feedback-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow-card); padding: 32px; margin-bottom: 28px; }
        .feedback-section h3 { font-size: 18px; font-weight: 300; color: var(--heading); margin-bottom: 18px; }
        .feedback-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
        .feedback-item:last-child { border-bottom: none; }
        .feedback-criterion { font-size: 14px; font-weight: 600; color: var(--heading); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .feedback-criterion .pill { padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 400; background: rgba(21,190,83,0.15); color: var(--success-text); border: 1px solid rgba(21,190,83,0.3); }
        .feedback-text { font-size: 15px; color: var(--body); line-height: 1.6; }

        /* Collapsible */
        details.collapsible { margin-top: 24px; }
        details.collapsible summary {
            font-size: 14px; font-weight: 400; color: var(--purple); cursor: pointer;
            padding: 10px 14px; border-radius: var(--radius); user-select: none;
            transition: background 0.15s;
        }
        details.collapsible summary:hover { background: var(--purple-bg); }
        details.collapsible .collapsible-body {
            padding: 16px 0 0 0; font-size: 14px; color: var(--body); line-height: 1.6;
            white-space: pre-wrap; word-wrap: break-word;
        }

        /* History table */
        .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow-card); overflow: hidden; }
        .history-header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .history-header h2 { font-size: 18px; font-weight: 300; color: var(--heading); }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th {
            font-size: 11px; font-weight: 400; color: var(--body); text-transform: uppercase;
            letter-spacing: 0.5px; text-align: left; padding: 12px 32px;
            background: #f8f9fb; border-bottom: 1px solid var(--border);
        }
        .history-table td {
            font-size: 14px; color: var(--heading); padding: 14px 32px;
            border-bottom: 1px solid var(--border);
        }
        .history-table tbody tr { transition: background 0.1s; }
        .history-table tbody tr:hover { background: #f8f9fb; }
        .history-table tbody tr:last-child td { border-bottom: none; }
        .history-table .cell-muted { color: var(--muted); font-size: 12px; }
        .history-table .cell-score { font-size: 22px; font-weight: 300; color: var(--heading); }

        /* Empty state */
        .empty-state { text-align: center; padding: 64px 24px; }
        .empty-state p { font-size: 16px; color: var(--body); margin-bottom: 20px; }

        /* Inline link */
        .inline-link { color: var(--purple); text-decoration: none; font-weight: 400; }
        .inline-link:hover { text-decoration: underline; }

        /* Footer */
        footer { text-align: center; padding: 40px 24px; font-size: 13px; color: var(--body); border-top: 1px solid var(--border); }

        /* Markdown content */
        .card.markdown-content { font-size: 16px; font-weight: 300; line-height: 1.7; color: var(--heading); }
        .card.markdown-content h2, .card.markdown-content h3 { font-size: 20px; font-weight: 300; letter-spacing: -0.22px; color: var(--heading); margin: 24px 0 12px; }
        .card.markdown-content h2:first-child, .card.markdown-content h3:first-child { margin-top: 0; }
        .card.markdown-content p { margin-bottom: 14px; color: var(--body); }
        .card.markdown-content ul, .card.markdown-content ol { margin: 0 0 14px 20px; color: var(--body); }
        .card.markdown-content li { margin-bottom: 4px; }
        .card.markdown-content strong { color: var(--heading); font-weight: 600; }
        .card.markdown-content code { font-family: var(--font-mono); font-size: 14px; background: #f1f5f9; padding: 2px 6px; border-radius: 3px; }
        .card.markdown-content pre { background: #f1f5f9; padding: 16px; border-radius: var(--radius); overflow-x: auto; margin-bottom: 14px; }
        .card.markdown-content pre code { background: none; padding: 0; }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 0 16px; }
            .nav-links { gap: 16px; }
            .hero { padding: 48px 24px 40px; }
            .hero h1 { font-size: 32px; letter-spacing: -0.64px; }
            .container { padding: 36px 16px; }
            .container-narrow { padding: 36px 16px; }
            .card { padding: 24px; }
            .score-grid { grid-template-columns: repeat(2, 1fr); }
            .score-overall { grid-column: span 2; flex-direction: column; text-align: center; }
            .score-overall .overall-text { text-align: center; }
            .history-table th, .history-table td { padding: 10px 16px; }
            .stat-grid { grid-template-columns: 1fr; }
            .feedback-section { padding: 24px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon">I</div>
            <span>IELTS Lab</span>
        </a>
        <div class="nav-links">
            <a href="/writing/" class="{% if request.url.path.startswith('/writing/') %}active{% endif %}">Writing</a>
            <a href="/speaking/" class="{% if request.url.path.startswith('/speaking/') %}active{% endif %}">Speaking</a>
            <a href="/vocabulary/" class="{% if request.url.path.startswith('/vocabulary/') %}active{% endif %}">Vocabulary</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>IELTS AI Learning Platform · Powered by DeepSeek</footer>
</body>
</html>
