{% extends "base.html" %}
{% block title %}登录 — IELTS Lab{% endblock %}
{% block content %}
<div class="container-narrow">
    <div class="card">
        <h1 class="card-title">用户登录</h1>
        <p class="card-subtitle">登录以查看你的写作批改记录</p>

        {% if error %}
        <div class="alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/login">
            <div class="form-group">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-input" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-input" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:14px; color:var(--body);">
            还没有账号？<a href="/auth/register" class="inline-link">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}
