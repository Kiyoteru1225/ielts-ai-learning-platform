{% extends "base.html" %}
{% block title %}雅思写作 AI 批改{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">雅思写作 AI 批改</h1>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="post" action="/writing/score">
            <div class="mb-3">
                <label for="essay" class="form-label">作文内容</label>
                <textarea
                    class="form-control"
                    id="essay"
                    name="essay"
                    rows="15"
                    placeholder="在此粘贴你的雅思作文（至少50个字符）..."
                    required
                ></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">任务类型</label>
                <div class="tabs">
                    <input type="radio" id="radio-1" name="task_type" value="task2" checked>
                    <label class="tab" for="radio-1">Task 2（议论文）</label>
                    <input type="radio" id="radio-2" name="task_type" value="task1">
                    <label class="tab" for="radio-2">Task 1（图表描述）</label>
                    <span class="glider"></span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">提交批改</button>
        </form>
    </div>
</div>
{% endblock %}
