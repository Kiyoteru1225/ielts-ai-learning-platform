{% extends "base.html" %}
{% block title %}注册 — IELTS Lab{% endblock %}
{% block content %}
<div class="container-narrow">
    <div class="card">
        <h1 class="card-title">用户注册</h1>
        <p class="card-subtitle">创建账号以开始使用 AI 写作批改</p>

        {% if error %}
        <div class="alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/register" onsubmit="return checkPasswords()">
            <div class="form-group">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-input" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-input" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-input" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password" class="form-label">确认密码</label>
                <input type="password" class="form-input" id="confirm_password" name="confirm_password" required minlength="6">
                <div id="password-match-feedback" style="display:none; color:var(--danger); font-size:13px; margin-top:4px;">两次输入的密码不一致</div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:14px; color:var(--body);">
            已有账号？<a href="/auth/login" class="inline-link">立即登录</a>
        </p>
    </div>
</div>

<script>
function checkPasswords() {
    const pw = document.getElementById("password").value;
    const cpw = document.getElementById("confirm_password").value;
    const fb = document.getElementById("password-match-feedback");

    if (pw !== cpw) {
        fb.style.display = "block";
        return false;
    }
    fb.style.display = "none";
    return true;
}
</script>
{% endblock %}
