{% extends "base.html" %}
{% block title %}注册 - 雅思 AI 学习平台{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">用户注册</h2>

        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/register" onsubmit="return checkPasswords()">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" required minlength="6">
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">确认密码</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
                <div id="password-match-feedback" class="form-text text-danger d-none">两次输入的密码不一致</div>
            </div>
            <button type="submit" class="btn btn-success w-100">注册</button>
        </form>

        <p class="mt-3 text-center">
            已有账号？<a href="/auth/login">立即登录</a>
        </p>
    </div>
</div>

<script>
function checkPasswords() {
    const pw = document.getElementById("password").value;
    const cpw = document.getElementById("confirm_password").value;
    const fb = document.getElementById("password-match-feedback");

    if (pw !== cpw) {
        fb.classList.remove("d-none");
        return false;
    }
    fb.classList.add("d-none");
    return true;
}
</script>
{% endblock %}
